<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperOps Interactive Demo</title>
  <script>
    !function () { var t = window; if ("function" != typeof t.Trainn) { var e = document, n = function () { n.c(arguments) }; n.q = [], n.c = function (t) { n.q.push(t) }, t.Trainn = n; var a = function () { var t = e.createElement("script"); t.type = "text/javascript", t.async = !0, t.src = "https://js.trainn.co/v2/index.js"; var n = e.getElementsByTagName("script")[0]; n.parentNode.insertBefore(t, n) }; "complete" === document.readyState ? a() : t.attachEvent ? t.attachEvent("onload", a) : t.addEventListener("load", a, !1) } }();
    Trainn("init", { workspace: "superops" });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1D9E75;
      flex-shrink: 0;
    }

    .bname {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .badge {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 20px;
      background: #fff;
      color: #666;
      border: 0.5px solid #ddd;
    }



    .layout {
      display: flex;
      gap: 14px;
      align-items: stretch;
    }

    .vpanel {
      flex: 3;
      border-radius: 12px;
      border: 0.5px solid #e0e0e0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
      min-width: 0;
    }

    .varea {
      flex: 1;
      background: #060b10;
      position: relative;
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .vph {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      padding: 2rem;
    }

    .vph-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 0.5px solid rgba(29,158,117,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .vph-t {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
    }

    .vph-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
    }

    .vbar {
      padding: 10px 16px;
      border-top: 0.5px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
    }

    .ts {
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #888;
    }

    .pbadge {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 20px;
      background: #E1F5EE;
      color: #0F6E56;
      border: 0.5px solid #9FE1CB;
      display: none;
    }

    .spacer { flex: 1; }

    .askbtn {
      font-size: 12px;
      padding: 6px 18px;
      border-radius: 8px;
      background: #1D9E75;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .askbtn:hover { background: #0F6E56; }

    .cpanel {
      flex: 2;
      border-radius: 12px;
      border: 0.5px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      background: #fff;
      min-width: 280px;
      max-width: 360px;
      overflow: hidden;
    }

    .chead {
      padding: 12px 16px;
      border-bottom: 0.5px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .cavatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #E1F5EE;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 0.5px solid #9FE1CB;
    }

    .ctitle {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .csub {
      font-size: 11px;
      color: #888;
    }

    .ctx {
      padding: 8px 14px;
      font-size: 11px;
      color: #185FA5;
      background: #E6F1FB;
      border-bottom: 0.5px solid #B5D4F4;
      display: none;
      line-height: 1.5;
      flex-shrink: 0;
    }

    .zbot-wrap {
      flex: 1;
      min-height: 400px;
      position: relative;
    }

    zapier-interfaces-chatbot-embed {
      width: 100%;
      height: 100%;
      min-height: 400px;
      display: block;
    }

    iframe.vframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      inset: 0;
    }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .cpanel { max-width: 100%; min-width: 0; }
      .urlinp { max-width: 100%; margin-left: 0; }
      .hdr { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="hdr">
      <div class="brand">
        <div class="dot"></div>
        <span class="bname">SuperOps</span>
        <span class="badge">Interactive Demo</span>
      </div>
    </div>

    <div class="layout">

      <div class="vpanel">
        <div class="varea" id="varea">
          <iframe
            src="https://superops.portal.trainn.co/share/BVUhLjcsuTN8I5hpA1F0Nw/embed?autoplay=false"
            frameborder="0"
            webkitallowfullscreen
            mozallowfullscreen
            allowfullscreen
            allow="autoplay; fullscreen"
            style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;">
          </iframe>
        </div>
        <div class="vbar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span class="ts" id="ts-display">00:00</span>
          <span class="pbadge" id="pbadge">Paused</span>
          <div class="spacer"></div>
          <button class="askbtn" id="askbtn" onclick="togglePause()">Pause &amp; Ask</button>
        </div>
      </div>

      <div class="cpanel">
        <div class="chead">
          <div class="cavatar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#1D9E75">
              <path d="M9.9 19.2L4 13.3l1.4-1.4 4.5 4.5L19.6 6l1.4 1.4z"/>
            </svg>
          </div>
          <div>
            <div class="ctitle">SuperOps Assistant</div>
            <div class="csub">Powered by your Zapier bot</div>
          </div>
        </div>
        <div class="ctx" id="ctx"></div>
        <div class="zbot-wrap">
          <iframe
            src="https://interfaces.zapier.com/embed/chatbot/cmneruzm8001jk4phx2n9tudc"
            frameborder="0"
            allow="clipboard-write *"
            style="width:100%;height:100%;min-height:400px;border:none;display:block;">
          </iframe>
        </div>
      </div>

    </div>
  </div>

  <script>
    let paused = false, seconds = 0, timer = null, videoLoaded = true;

    function fmt(s) {
      return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
    }

    function startTimer() {
      if (timer) return;
      timer = setInterval(() => {
        if (!paused && videoLoaded) {
          seconds++;
          document.getElementById('ts-display').textContent = fmt(seconds);
        }
      }, 1000);
    }

    startTimer();

    function togglePause() {
      paused = !paused;
      const btn = document.getElementById('askbtn');
      const badge = document.getElementById('pbadge');
      const ctx = document.getElementById('ctx');
      if (paused) {
        btn.textContent = 'Resume';
        badge.style.display = 'inline-block';
        ctx.style.display = 'block';
        ctx.textContent = 'Paused at ' + fmt(seconds) + ' — ask your bot about this moment';
      } else {
        btn.textContent = 'Pause & Ask';
        badge.style.display = 'none';
        ctx.style.display = 'none';
      }
    }
  </script>
</body>
</html>
